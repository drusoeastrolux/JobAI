<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatAgent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep:       #020203;
      --bg-base:       #050506;
      --bg-elevated:   #0a0a0c;
      --surface:       rgba(255,255,255,0.04);
      --surface-hover: rgba(255,255,255,0.07);
      --border:        rgba(255,255,255,0.08);
      --border-focus:  rgba(94,106,210,0.6);
      --accent:        #5E6AD2;
      --accent-hover:  #7b87e8;
      --accent-glow:   rgba(94,106,210,0.25);
      --text:          #EDEDEF;
      --text-muted:    #8A8F98;
      --text-faint:    #4a4f5a;
      --user-bubble:   rgba(94,106,210,0.18);
      --user-border:   rgba(94,106,210,0.35);
      --ai-bubble:     rgba(255,255,255,0.04);
      --danger:        #f87171;
      --success:       #34d399;
      --radius:        14px;
      --easing:        cubic-bezier(0.16,1,0.3,1);
    }

    html, body {
      height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      overflow: hidden;
    }

    /* ── Ambient blobs ── */
    #blobs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.07;
      animation: drift 18s ease-in-out infinite alternate;
    }

    .blob-1 { width: 500px; height: 500px; background: #5E6AD2; top: -120px; left: -100px; animation-duration: 20s; }
    .blob-2 { width: 380px; height: 380px; background: #9183f9; bottom: -80px; right: -80px; animation-duration: 15s; animation-delay: -5s; }
    .blob-3 { width: 260px; height: 260px; background: #34d399; top: 40%; left: 60%; animation-duration: 25s; animation-delay: -10s; opacity: 0.04; }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.08); }
    }

    /* ── Layout ── */
    #app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      height: 58px;
      background: rgba(5,5,6,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .brand-icon {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: linear-gradient(135deg, #5E6AD2, #9183f9);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      box-shadow: 0 0 14px var(--accent-glow);
    }

    .brand-name {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .brand-badge {
      font-size: 0.62rem;
      font-weight: 500;
      color: var(--accent);
      background: var(--accent-glow);
      border: 1px solid rgba(94,106,210,0.3);
      padding: 1px 6px;
      border-radius: 20px;
      letter-spacing: 0.03em;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .model-select-wrap {
      position: relative;
    }

    .model-select-wrap::before {
      content: '';
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 6px var(--success);
      z-index: 1;
    }

    select {
      appearance: none;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.35rem 2rem 0.35rem 1.6rem;
      border-radius: 8px;
      font-size: 0.75rem;
      font-family: inherit;
      cursor: pointer;
      max-width: 200px;
      transition: border-color 0.15s, background 0.15s;
      outline: none;
    }

    select:hover { background: var(--surface-hover); border-color: rgba(255,255,255,0.15); }
    select:focus { border-color: var(--border-focus); }

    .icon-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 0.35rem 0.7rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.78rem;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .icon-btn:hover { color: var(--danger); border-color: rgba(248,113,113,0.4); background: rgba(248,113,113,0.06); }

    /* ── System prompt ── */
    #system-section {
      padding: 0.6rem 1.5rem;
      background: rgba(5,5,6,0.6);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .system-label {
      font-size: 0.68rem;
      font-weight: 500;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      display: block;
      margin-bottom: 0.3rem;
    }

    #system-prompt {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 0.45rem 0.75rem;
      border-radius: 8px;
      font-size: 0.8rem;
      font-family: inherit;
      resize: none;
      height: 40px;
      line-height: 1.5;
      transition: border-color 0.2s, color 0.2s;
      outline: none;
    }

    #system-prompt:focus {
      border-color: var(--border-focus);
      color: var(--text);
    }

    #system-prompt::placeholder { color: var(--text-faint); }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 1.5rem 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
    #messages::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding-bottom: 3rem;
      animation: fadeIn 0.5s var(--easing);
    }

    .empty-icon {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(94,106,210,0.2), rgba(145,131,249,0.1));
      border: 1px solid rgba(94,106,210,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      box-shadow: 0 0 30px rgba(94,106,210,0.1);
    }

    .empty-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
    }

    .empty-sub {
      font-size: 0.82rem;
      color: var(--text-muted);
      text-align: center;
      max-width: 280px;
      line-height: 1.6;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      max-width: 480px;
      margin-top: 0.5rem;
    }

    .suggestion-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 0.4rem 0.9rem;
      border-radius: 20px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.2s var(--easing);
      font-family: inherit;
    }

    .suggestion-chip:hover {
      background: var(--surface-hover);
      border-color: rgba(94,106,210,0.4);
      color: var(--text);
      transform: translateY(-1px);
    }

    /* Message rows */
    .message {
      display: flex;
      gap: 0.75rem;
      max-width: 760px;
      width: 100%;
      animation: slideUp 0.3s var(--easing);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .message.user  { align-self: flex-end; flex-direction: row-reverse; }
    .message.assistant { align-self: flex-start; }

    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      flex-shrink: 0;
      margin-top: 3px;
    }

    .message.user .avatar {
      background: linear-gradient(135deg, #5E6AD2, #9183f9);
      box-shadow: 0 0 10px var(--accent-glow);
    }

    .message.assistant .avatar {
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .bubble {
      padding: 0.75rem 1.1rem;
      border-radius: var(--radius);
      font-size: 0.88rem;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      max-width: calc(100% - 40px);
      position: relative;
    }

    .message.user .bubble {
      background: var(--user-bubble);
      border: 1px solid var(--user-border);
      border-bottom-right-radius: 4px;
      color: var(--text);
    }

    .message.assistant .bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }

    /* Streaming cursor */
    .bubble.streaming::after {
      content: "▌";
      color: var(--accent);
      animation: blink 0.6s step-end infinite;
      margin-left: 1px;
    }

    @keyframes blink { 50% { opacity: 0; } }

    /* Typing indicator */
    .typing-dots {
      display: flex;
      gap: 4px;
      padding: 0.75rem 1rem;
      align-items: center;
    }

    .typing-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-faint);
      animation: bounce 1.2s ease-in-out infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-5px); opacity: 1; }
    }

    /* Timestamp */
    .msg-time {
      font-size: 0.65rem;
      color: var(--text-faint);
      margin-top: 0.3rem;
      padding: 0 2px;
    }

    .message.user  .msg-time { text-align: right; }
    .message.assistant .msg-time { text-align: left; }

    .msg-col {
      display: flex;
      flex-direction: column;
      max-width: calc(100% - 40px);
    }

    /* Error */
    .error-msg {
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.25);
      color: var(--danger);
      padding: 0.65rem 1rem;
      border-radius: 10px;
      font-size: 0.82rem;
      align-self: center;
      max-width: 600px;
      animation: slideUp 0.3s var(--easing);
    }

    /* ── Input area ── */
    #input-area {
      padding: 1rem 1.5rem 1.25rem;
      background: rgba(5,5,6,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    #input-wrap {
      max-width: 760px;
      margin: 0 auto;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: border-color 0.2s, box-shadow 0.2s;
      overflow: hidden;
    }

    #input-wrap:focus-within {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    #input-row {
      display: flex;
      align-items: flex-end;
      gap: 0;
    }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      padding: 0.8rem 1rem;
      font-size: 0.9rem;
      font-family: inherit;
      resize: none;
      min-height: 48px;
      max-height: 160px;
      overflow-y: auto;
      line-height: 1.5;
      outline: none;
    }

    #user-input::placeholder { color: var(--text-faint); }

    #send-btn {
      background: var(--accent);
      border: none;
      color: #fff;
      width: 36px;
      height: 36px;
      border-radius: 9px;
      margin: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 0 12px var(--accent-glow);
    }

    #send-btn:hover:not(:disabled) {
      background: var(--accent-hover);
      transform: scale(1.05);
      box-shadow: 0 0 18px var(--accent-glow);
    }

    #send-btn:active:not(:disabled) { transform: scale(0.95); }
    #send-btn:disabled { opacity: 0.35; cursor: not-allowed; box-shadow: none; }

    .send-icon {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    #input-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 760px;
      margin: 0.45rem auto 0;
      padding: 0 2px;
    }

    .input-hint {
      font-size: 0.68rem;
      color: var(--text-faint);
    }

    #char-count {
      font-size: 0.68rem;
      color: var(--text-faint);
      transition: color 0.2s;
    }

    #char-count.warn { color: #f59e0b; }
    #char-count.danger { color: var(--danger); }
  </style>
</head>
<body>

<div id="blobs">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<div id="app">

  <header>
    <div class="brand">
      <div class="brand-icon">✦</div>
      <span class="brand-name">ChatAgent</span>
      <span class="brand-badge">AI</span>
    </div>
    <div class="header-right">
      <div class="model-select-wrap">
        <select id="model-select" title="Select model">
          <option value="anthropic/claude-opus-4-6">claude-opus-4-6</option>
        </select>
      </div>
      <button class="icon-btn" id="clear-btn" title="Clear conversation">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        Clear
      </button>
    </div>
  </header>

  <div id="system-section">
    <span class="system-label">System Prompt</span>
    <textarea id="system-prompt" placeholder="You are a helpful assistant…" spellcheck="false"></textarea>
  </div>

  <div id="messages">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">✦</div>
      <div class="empty-title">How can I help you?</div>
      <div class="empty-sub">Ask me anything. Messages are stored in-browser only.</div>
      <div class="suggestions">
        <button class="suggestion-chip" data-prompt="Explain how streaming works in HTTP">Explain streaming HTTP</button>
        <button class="suggestion-chip" data-prompt="Write a short poem about the night sky">Write a poem</button>
        <button class="suggestion-chip" data-prompt="What are the best practices for REST API design?">REST API best practices</button>
        <button class="suggestion-chip" data-prompt="Summarize the history of artificial intelligence">History of AI</button>
      </div>
    </div>
  </div>

  <div id="input-area">
    <div id="input-wrap">
      <div id="input-row">
        <textarea
          id="user-input"
          placeholder="Message… (Shift+Enter for newline)"
          rows="1"
          spellcheck="true"
        ></textarea>
        <button id="send-btn" title="Send (Enter)" disabled>
          <svg class="send-icon" viewBox="0 0 24 24">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
    <div id="input-footer">
      <span class="input-hint">Enter to send · Shift+Enter for newline</span>
      <span id="char-count"></span>
    </div>
  </div>

</div>

<script>
  const messagesEl   = document.getElementById("messages");
  const emptyState   = document.getElementById("empty-state");
  const userInput    = document.getElementById("user-input");
  const sendBtn      = document.getElementById("send-btn");
  const clearBtn     = document.getElementById("clear-btn");
  const modelSelect  = document.getElementById("model-select");
  const systemPromptEl = document.getElementById("system-prompt");
  const charCount    = document.getElementById("char-count");

  let conversationHistory = [];
  let isStreaming = false;

  // ── Auto-resize textarea ──
  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 160) + "px";
  }

  userInput.addEventListener("input", () => {
    autoResize(userInput);
    const len = userInput.value.length;
    if (len > 0) {
      charCount.textContent = len.toLocaleString();
      charCount.className = len > 3000 ? "danger" : len > 2000 ? "warn" : "";
    } else {
      charCount.textContent = "";
    }
    sendBtn.disabled = userInput.value.trim().length === 0 || isStreaming;
  });

  // ── Load models ──
  async function loadModels() {
    try {
      const res = await fetch("/api/models");
      if (!res.ok) return;
      const data = await res.json();
      const models = data.data ?? [];
      if (!models.length) return;
      modelSelect.innerHTML = "";
      const sorted = [
        ...models.filter(m => m.id.includes("claude-opus-4-6")),
        ...models.filter(m => !m.id.includes("claude-opus-4-6")),
      ];
      sorted.forEach(m => {
        const opt = document.createElement("option");
        opt.value = m.id;
        opt.textContent = m.id;
        if (m.id.includes("claude-opus-4-6")) opt.selected = true;
        modelSelect.appendChild(opt);
      });
    } catch { /* keep default */ }
  }

  loadModels();

  // ── Suggestion chips ──
  document.querySelectorAll(".suggestion-chip").forEach(chip => {
    chip.addEventListener("click", () => {
      userInput.value = chip.dataset.prompt;
      autoResize(userInput);
      sendBtn.disabled = false;
      sendMessage();
    });
  });

  // ── Append message ──
  function appendMessage(role, content, streaming = false) {
    if (emptyState.parentNode) emptyState.remove();

    const row = document.createElement("div");
    row.className = `message ${role}`;

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = role === "user" ? "🧑" : "✦";

    const col = document.createElement("div");
    col.className = "msg-col";

    const bubble = document.createElement("div");
    bubble.className = "bubble" + (streaming ? " streaming" : "");
    bubble.textContent = content;

    const time = document.createElement("div");
    time.className = "msg-time";
    time.textContent = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

    col.appendChild(bubble);
    col.appendChild(time);
    row.appendChild(avatar);
    row.appendChild(col);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;

    return bubble;
  }

  // ── Typing indicator ──
  function showTyping() {
    const row = document.createElement("div");
    row.className = "message assistant";
    row.id = "typing-indicator";

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = "✦";

    const dots = document.createElement("div");
    dots.className = "typing-dots";
    dots.innerHTML = "<span></span><span></span><span></span>";

    row.appendChild(avatar);
    row.appendChild(dots);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById("typing-indicator");
    if (el) el.remove();
  }

  function appendError(msg) {
    const div = document.createElement("div");
    div.className = "error-msg";
    div.textContent = "⚠ " + msg;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // ── Send ──
  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text || isStreaming) return;

    isStreaming = true;
    sendBtn.disabled = true;
    userInput.value = "";
    charCount.textContent = "";
    autoResize(userInput);

    conversationHistory.push({ role: "user", content: text });
    appendMessage("user", text);
    showTyping();

    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          messages: conversationHistory,
          model: modelSelect.value,
          systemPrompt: systemPromptEl.value.trim() || undefined,
        }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: res.statusText }));
        throw new Error(err.error ?? res.statusText);
      }

      hideTyping();
      const assistantBubble = appendMessage("assistant", "", true);
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let assistantContent = "";
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop() ?? "";

        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          const data = line.slice(6).trim();
          if (data === "[DONE]") break;
          try {
            const parsed = JSON.parse(data);
            if (parsed.error) throw new Error(parsed.error);
            if (parsed.content) {
              assistantContent += parsed.content;
              assistantBubble.textContent = assistantContent;
              messagesEl.scrollTop = messagesEl.scrollHeight;
            }
          } catch (e) {
            if (e instanceof SyntaxError) continue;
            throw e;
          }
        }
      }

      assistantBubble.classList.remove("streaming");
      conversationHistory.push({ role: "assistant", content: assistantContent });

    } catch (err) {
      hideTyping();
      conversationHistory.pop();
      appendError(err.message ?? "Something went wrong");
    } finally {
      isStreaming = false;
      sendBtn.disabled = userInput.value.trim().length === 0;
      userInput.focus();
    }
  }

  sendBtn.addEventListener("click", sendMessage);

  userInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      if (!sendBtn.disabled) sendMessage();
    }
  });

  clearBtn.addEventListener("click", () => {
    conversationHistory = [];
    messagesEl.innerHTML = "";
    messagesEl.appendChild(emptyState);
    charCount.textContent = "";
    sendBtn.disabled = true;
  });
</script>
</body>
</html>
