<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatAgent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f11;
      --surface: #1a1a1f;
      --surface-2: #242429;
      --border: #2e2e36;
      --accent: #7c6af7;
      --accent-hover: #9183f9;
      --text: #e8e8f0;
      --text-muted: #8888a0;
      --user-bubble: #2a2060;
      --assistant-bubble: #1a1a1f;
      --danger: #f87171;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.25rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    header h1 span { font-size: 1.3rem; }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    select {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.3rem 0.5rem;
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      max-width: 220px;
    }

    select:focus { outline: 2px solid var(--accent); outline-offset: 1px; }

    button.icon-btn {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 0.3rem 0.55rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: color 0.15s, border-color 0.15s;
    }

    button.icon-btn:hover { color: var(--danger); border-color: var(--danger); }

    /* System prompt area */
    #system-section {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.5rem 1.25rem;
      flex-shrink: 0;
    }

    #system-section label {
      font-size: 0.72rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      display: block;
      margin-bottom: 0.25rem;
    }

    #system-prompt {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.4rem 0.6rem;
      border-radius: 6px;
      font-size: 0.82rem;
      resize: none;
      height: 44px;
      font-family: inherit;
      line-height: 1.4;
    }

    #system-prompt:focus { outline: 2px solid var(--accent); outline-offset: 1px; }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .message {
      display: flex;
      gap: 0.75rem;
      max-width: 820px;
      width: 100%;
    }

    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.assistant { align-self: flex-start; }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .message.user .avatar { background: var(--accent); }
    .message.assistant .avatar { background: var(--surface-2); border: 1px solid var(--border); }

    .bubble {
      padding: 0.7rem 1rem;
      border-radius: 12px;
      font-size: 0.92rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      max-width: calc(100% - 42px);
    }

    .message.user .bubble {
      background: var(--user-bubble);
      border: 1px solid #3d2f8a;
      border-bottom-right-radius: 4px;
    }

    .message.assistant .bubble {
      background: var(--assistant-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .bubble.streaming::after {
      content: "▌";
      animation: blink 0.7s step-end infinite;
      color: var(--accent);
    }

    @keyframes blink { 50% { opacity: 0; } }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      gap: 0.75rem;
      text-align: center;
    }

    .empty-state .icon { font-size: 2.5rem; }
    .empty-state p { font-size: 0.9rem; max-width: 320px; }

    .error-msg {
      background: #2a1010;
      border: 1px solid #5c1f1f;
      color: var(--danger);
      padding: 0.6rem 0.9rem;
      border-radius: 8px;
      font-size: 0.85rem;
      align-self: center;
      max-width: 600px;
    }

    /* Input area */
    #input-area {
      padding: 0.9rem 1.25rem;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    #input-row {
      display: flex;
      gap: 0.6rem;
      align-items: flex-end;
      max-width: 820px;
      margin: 0 auto;
    }

    #user-input {
      flex: 1;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.65rem 0.9rem;
      border-radius: 10px;
      font-size: 0.92rem;
      font-family: inherit;
      resize: none;
      min-height: 44px;
      max-height: 180px;
      overflow-y: auto;
      line-height: 1.5;
      transition: border-color 0.15s;
    }

    #user-input:focus { outline: none; border-color: var(--accent); }
    #user-input::placeholder { color: var(--text-muted); }

    #send-btn {
      background: var(--accent);
      border: none;
      color: #fff;
      padding: 0.65rem 1rem;
      border-radius: 10px;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.15s, opacity 0.15s;
      height: 44px;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    #send-btn:hover:not(:disabled) { background: var(--accent-hover); }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    #char-hint {
      font-size: 0.72rem;
      color: var(--text-muted);
      text-align: right;
      margin-top: 0.3rem;
      max-width: 820px;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>
<body>

<header>
  <h1><span>🤖</span> ChatAgent</h1>
  <div class="header-controls">
    <select id="model-select" title="Select model">
      <option value="anthropic/claude-opus-4-6">claude-opus-4-6</option>
    </select>
    <button class="icon-btn" id="clear-btn" title="Clear conversation">🗑 Clear</button>
  </div>
</header>

<div id="system-section">
  <label for="system-prompt">System Prompt</label>
  <textarea id="system-prompt" placeholder="You are a helpful assistant…" spellcheck="false"></textarea>
</div>

<div id="messages">
  <div class="empty-state" id="empty-state">
    <div class="icon">💬</div>
    <p>Start a conversation. Your messages are kept in-browser only.</p>
  </div>
</div>

<div id="input-area">
  <div id="input-row">
    <textarea
      id="user-input"
      placeholder="Message… (Shift+Enter for newline)"
      rows="1"
      spellcheck="true"
    ></textarea>
    <button id="send-btn" title="Send (Enter)">Send ➤</button>
  </div>
  <div id="char-hint">Enter to send · Shift+Enter for newline</div>
</div>

<script>
  const messagesEl = document.getElementById("messages");
  const emptyState = document.getElementById("empty-state");
  const userInput = document.getElementById("user-input");
  const sendBtn = document.getElementById("send-btn");
  const clearBtn = document.getElementById("clear-btn");
  const modelSelect = document.getElementById("model-select");
  const systemPromptEl = document.getElementById("system-prompt");

  let conversationHistory = [];
  let isStreaming = false;

  // Auto-resize textarea
  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 180) + "px";
  }

  userInput.addEventListener("input", () => autoResize(userInput));

  // Load models
  async function loadModels() {
    try {
      const res = await fetch("/api/models");
      if (!res.ok) return;
      const data = await res.json();
      const models = data.data ?? [];
      if (!models.length) return;

      modelSelect.innerHTML = "";
      // Put claude-opus-4-6 first if available
      const sorted = [
        ...models.filter(m => m.id.includes("claude-opus-4-6")),
        ...models.filter(m => !m.id.includes("claude-opus-4-6")),
      ];
      sorted.forEach(m => {
        const opt = document.createElement("option");
        opt.value = m.id;
        opt.textContent = m.id;
        if (m.id.includes("claude-opus-4-6")) opt.selected = true;
        modelSelect.appendChild(opt);
      });
    } catch {
      // Keep default option on error
    }
  }

  loadModels();

  function appendMessage(role, content, streaming = false) {
    emptyState.style.display = "none";

    const div = document.createElement("div");
    div.className = `message ${role}`;

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = role === "user" ? "🧑" : "🤖";

    const bubble = document.createElement("div");
    bubble.className = "bubble" + (streaming ? " streaming" : "");
    bubble.textContent = content;

    div.appendChild(avatar);
    div.appendChild(bubble);
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;

    return bubble;
  }

  function appendError(msg) {
    const div = document.createElement("div");
    div.className = "error-msg";
    div.textContent = "⚠ " + msg;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text || isStreaming) return;

    isStreaming = true;
    sendBtn.disabled = true;
    userInput.value = "";
    autoResize(userInput);

    conversationHistory.push({ role: "user", content: text });
    appendMessage("user", text);

    const assistantBubble = appendMessage("assistant", "", true);

    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          messages: conversationHistory,
          model: modelSelect.value,
          systemPrompt: systemPromptEl.value.trim() || undefined,
        }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: res.statusText }));
        throw new Error(err.error ?? res.statusText);
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let assistantContent = "";
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop() ?? "";

        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          const data = line.slice(6).trim();
          if (data === "[DONE]") break;
          try {
            const parsed = JSON.parse(data);
            if (parsed.error) throw new Error(parsed.error);
            if (parsed.content) {
              assistantContent += parsed.content;
              assistantBubble.textContent = assistantContent;
              messagesEl.scrollTop = messagesEl.scrollHeight;
            }
          } catch (e) {
            if (e instanceof SyntaxError) continue;
            throw e;
          }
        }
      }

      assistantBubble.classList.remove("streaming");
      conversationHistory.push({ role: "assistant", content: assistantContent });
    } catch (err) {
      assistantBubble.remove();
      conversationHistory.pop();
      appendError(err.message ?? "Something went wrong");
    } finally {
      isStreaming = false;
      sendBtn.disabled = false;
      userInput.focus();
    }
  }

  sendBtn.addEventListener("click", sendMessage);

  userInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  clearBtn.addEventListener("click", () => {
    conversationHistory = [];
    messagesEl.innerHTML = "";
    messagesEl.appendChild(emptyState);
    emptyState.style.display = "";
  });
</script>

</body>
</html>
